# PaperMod params
params:
  env: production
  description: "AI 技術實作、加密貨幣量化交易、自動化工具開發 — Judy AI Lab"
  author: "Judy AI Lab"
  DateFormat: "2006-01-02"
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: false
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  # SEO
  keywords:
    - AI Agent
    - 量化交易
    - quant trading
    - Claude Code
    - AI 團隊
    - backtesting
    - crypto trading
    - AI automation
    - multi-agent
    - position sizing
    - AI 에이전트
    - 퀀트 트레이딩
    - 암호화폐 자동매매
    - 멀티 에이전트
  images: []
  label:
    text: "Judy AI Lab"
    icon: "/logo.jpg"
    iconHeight: 35

  # Search
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  # Analytics & Search Console
  analytics:
    google:
      SiteVerificationTag: "PFX4HLHnOVlRfT52zq8iv2DhtV5wWVfqawJhAqUBPHg"

# Syntax Highlighting
markup:
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    noClasses: false
    style: monokai
  goldmark:
    renderer:
      unsafe: true

# Outputs - enable RSS, JSON (for search), sitemap
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Sitemap
sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

# Privacy (GDPR compliance)
privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: false
  instagram:
    disable: true
  x:
    disable: true
  vimeo:
    disable: true
  youtube:
    privacyEnhanced: true
